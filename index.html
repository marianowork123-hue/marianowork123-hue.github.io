<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Azul Marino — Joyería de autor</title>
  <meta name="description" content="Azul Marino · joyería de lujo hecha a mano. Anillos, collares, aretes y pulseras en oro 18k y piedras preciosas. Pide por WhatsApp." />

  <!-- Color del navegador y favicon (gema azul en SVG, sin archivos externos) -->
  <meta name="theme-color" content="#0E2A3A" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M6 6h20l4 6-14 18L2 12z' fill='%23176B82'/%3E%3Cpath d='M16 6 6 6 2 12zM16 6l10 0 4 6zM2 12h28' stroke='%23ffffff' stroke-opacity='.5' fill='none'/%3E%3C/svg%3E" />

  <style>
    html, body { margin: 0; background: #FBF9F4; }
    /* Pantalla de carga mientras Babel transpila la app */
    #boot {
      position: fixed; inset: 0; display: grid; place-items: center;
      font-family: system-ui, sans-serif; color: #0E2A3A; gap: 1rem;
      text-align: center;
    }
    #boot .mk { letter-spacing: .42em; font-size: .82rem; padding-left: .42em; opacity: .8; }
    #boot .sp {
      width: 28px; height: 28px; border: 2px solid #d9d2c4; border-top-color: #176B82;
      border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot">
      <div>
        <div class="sp"></div>
        <p class="mk">AZUL MARINO</p>
        <p style="font-size:.78rem;color:#8a8a8a;opacity:.7">Cargando la tienda…</p>
      </div>
    </div>
  </div>

  <!-- React 18 (producción) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Puente: lucide-react (UMD) busca window.react en minúscula. -->
  <script>window.react = window.React;</script>

  <!-- Íconos lucide-react (UMD → window.LucideReact) -->
  <script crossorigin src="https://unpkg.com/lucide-react@0.408.0/dist/umd/lucide-react.min.js"></script>

  <!-- Babel para transpilar el JSX directamente en el navegador -->
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

  <!-- La tienda. type="text/babel" => Babel lo compila al cargar la página. -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
